<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♠ CRAYXUS // SOCCER SNIPER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    :root {
      --bg: #060810;
      --bg2: #0c0f1a;
      --card: #0f1320;
      --border: #1e2538;
      --border2: #252d45;
      --text: #cdd6f4;
      --muted: #6c7086;
      --green: #a6e3a1;
      --red: #f38ba8;
      --yellow: #f9e2af;
      --blue: #89b4fa;
      --cyan: #89dceb;
      --purple: #cba6f7;
      --orange: #fab387;
      --teal: #94e2d5;
      --glow-green: 0 0 12px rgba(166,227,161,0.4);
      --glow-red: 0 0 12px rgba(243,139,168,0.4);
      --glow-blue: 0 0 12px rgba(137,180,250,0.4);
      --glow-purple: 0 0 12px rgba(203,166,247,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SCANLINES OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border2);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--purple);
      text-shadow: var(--glow-purple);
    }
    .logo .spade { color: var(--text); opacity: 0.9; margin-right: 8px; }
    .logo .slash { color: var(--muted); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .live-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow-green);
      animation: blink 1.4s infinite;
    }
    .live-dot.offline { color: var(--muted); }
    .live-dot.offline::before { background: var(--muted); animation: none; box-shadow: none; }
    .live-dot.scanning { color: var(--yellow); }
    .live-dot.scanning::before { background: var(--yellow); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── MAIN LAYOUT ── */
    main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

    /* ── SNIPER SIGNAL CARD (TOP) ── */
    .sniper-card {
      background: linear-gradient(135deg, #0f1320 0%, #12102a 100%);
      border: 1px solid var(--purple);
      border-radius: 12px;
      padding: 20px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 28px;
      box-shadow: 0 0 30px rgba(203,166,247,0.08);
      position: relative;
      overflow: hidden;
    }
    .sniper-card::before {
      content: '♠';
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 80px;
      color: rgba(203,166,247,0.06);
      font-weight: 700;
    }
    .sniper-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--purple);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sniper-match {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }
    .sniper-signal {
      margin-left: auto;
      text-align: right;
    }
    .sniper-direction {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .sniper-direction.home { color: var(--red); text-shadow: var(--glow-red); }
    .sniper-direction.away { color: var(--blue); text-shadow: var(--glow-blue); }
    .sniper-direction.neutral { color: var(--muted); }
    .sniper-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Momentum Bar */
    .momentum-bar-wrap {
      width: 200px;
      flex-shrink: 0;
    }
    .momentum-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .momentum-label span { color: var(--text); }
    .momentum-track {
      height: 8px;
      background: var(--border2);
      border-radius: 4px;
      overflow: hidden;
    }
    .momentum-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
      background: linear-gradient(90deg, var(--purple), var(--red));
      box-shadow: var(--glow-red);
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      position: relative;
    }
    .stat-card .sv {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card .sl { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .stat-card.alert-card { border-color: var(--red); }
    .stat-card.alert-card .sv { color: var(--red); text-shadow: var(--glow-red); }
    .stat-card .sv.green { color: var(--green); }
    .stat-card .sv.blue { color: var(--blue); }
    .stat-card .sv.yellow { color: var(--yellow); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--purple); color: var(--purple); }
    .btn.primary { border-color: var(--purple); color: var(--purple); }
    .btn.primary:hover { background: rgba(203,166,247,0.1); box-shadow: var(--glow-purple); }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .toolbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .countdown { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

    /* ── MATCH CARDS ── */
    .matches-grid { display: flex; flex-direction: column; gap: 12px; }

    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .match-card:hover { border-color: var(--border2); }
    .match-card.rank-1 { border-color: var(--purple); box-shadow: 0 0 20px rgba(203,166,247,0.06); }
    .match-card.rank-2 { border-color: rgba(137,180,250,0.4); }
    .match-card.rank-3 { border-color: rgba(148,226,213,0.3); }
    .match-card.has-alert { border-color: var(--red); box-shadow: 0 0 16px rgba(243,139,168,0.1); }

    .match-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background 0.15s;
    }
    .match-header:hover { background: rgba(255,255,255,0.02); }
    .match-header.expanded { border-bottom-color: var(--border); }

    .rank-badge {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .rank-badge.r1 { background: rgba(203,166,247,0.15); color: var(--purple); border: 1px solid var(--purple); }
    .rank-badge.r2 { background: rgba(137,180,250,0.1); color: var(--blue); border: 1px solid rgba(137,180,250,0.3); }
    .rank-badge.r3 { background: rgba(148,226,213,0.1); color: var(--teal); border: 1px solid rgba(148,226,213,0.3); }
    .rank-badge.rn { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); }

    .match-teams {
      flex: 1;
      min-width: 0;
    }
    .match-teams .teams-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .match-teams .teams-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .match-heat {
      text-align: right;
      flex-shrink: 0;
    }
    .heat-score {
      font-size: 22px;
      font-weight: 700;
      color: var(--yellow);
    }
    .heat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    /* Signal pill */
    .signal-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .signal-pill.home { background: rgba(243,139,168,0.15); color: var(--red); border: 1px solid rgba(243,139,168,0.3); }
    .signal-pill.away { background: rgba(137,180,250,0.15); color: var(--blue); border: 1px solid rgba(137,180,250,0.3); }
    .signal-pill.neutral { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); }

    .momentum-mini {
      width: 80px;
      flex-shrink: 0;
    }
    .momentum-mini-track {
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .momentum-mini-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--purple), var(--red));
    }
    .momentum-mini-val {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .chevron {
      color: var(--muted);
      font-size: 12px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ── MATCH BODY (expanded) ── */
    .match-body { display: none; padding: 16px 20px; }
    .match-body.open { display: block; }

    /* Signal detail bar */
    .signal-detail {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
    }
    .sd-item { font-size: 11px; }
    .sd-item .sd-k { color: var(--muted); letter-spacing: 1px; margin-bottom: 2px; font-size: 10px; }
    .sd-item .sd-v { font-size: 14px; font-weight: 600; color: var(--text); }
    .sd-item .sd-v.up { color: var(--green); }
    .sd-item .sd-v.down { color: var(--red); }
    .sd-item .sd-v.blue { color: var(--blue); }

    /* Odds table */
    .table-wrap { overflow-x: auto; }
    .odds-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .odds-table th {
      background: var(--bg2);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .odds-table td {
      padding: 7px 12px;
      border-bottom: 1px solid rgba(30,37,56,0.6);
      white-space: nowrap;
    }
    .odds-table tr:last-child td { border-bottom: none; }
    .odds-table tr:hover td { background: rgba(255,255,255,0.015); }

    .odds-table tr.in-window td { background: rgba(137,180,250,0.04); }
    .odds-table tr.in-window td:first-child { border-left: 2px solid var(--blue); }

    .odds-home { color: var(--red); font-weight: 600; }
    .odds-away { color: var(--blue); font-weight: 600; }
    .odds-hcap { color: var(--yellow); font-weight: 600; }
    .status-ji { color: var(--red); font-size: 10px; }
    .status-zao { color: var(--green); font-size: 10px; }

    .more-records-btn {
      display: block;
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: none;
      border: 1px dashed var(--border2);
      border-radius: 6px;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      letter-spacing: 1px;
    }
    .more-records-btn:hover { border-color: var(--purple); color: var(--purple); }

    /* Bet365 section */
    .bet365-section {
      margin-top: 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 14px 18px;
    }
    .bet365-title {
      font-size: 10px;
      color: var(--orange);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hcap-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hcap-pill {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
    }
    .hcap-pill .hp-line { color: var(--yellow); font-weight: 600; }
    .hcap-pill .hp-odds { color: var(--muted); font-size: 11px; margin-top: 2px; }

    /* ── ALERT BADGE ── */
    .alert-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: rgba(243,139,168,0.12);
      border: 1px solid rgba(243,139,168,0.3);
      border-radius: 4px;
      color: var(--red);
      font-size: 10px;
      letter-spacing: 1px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty .e-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty .e-text { font-size: 13px; letter-spacing: 1px; }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--purple);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 320px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── LAST UPDATED BAR ── */
    .bottom-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 8px 24px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      gap: 24px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="spade">♠</span>CRAYXUS<span class="slash"> // </span>SOCCER SNIPER
  </div>
  <div class="header-right">
    <span id="live-indicator" class="live-dot offline">OFFLINE</span>
    <span id="header-time" style="font-size:11px;letter-spacing:1px;"></span>
  </div>
</header>

<main>

  <!-- SNIPER SIGNAL CARD -->
  <div class="sniper-card" id="sniper-card">
    <div>
      <div class="sniper-label">▶ TODAY'S SNIPER TARGET</div>
      <div class="sniper-match" id="sniper-match">-- 等待数据 --</div>
      <div class="sniper-meta" id="sniper-meta">扫描中...</div>
    </div>
    <div class="momentum-bar-wrap">
      <div class="momentum-label">MOMENTUM <span id="sniper-momentum-val">0</span></div>
      <div class="momentum-track">
        <div class="momentum-fill" id="sniper-momentum-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="sniper-signal">
      <div class="sniper-direction neutral" id="sniper-direction">---</div>
      <div class="sniper-meta" id="sniper-signal-label">等待信号</div>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="sv green" id="stat-matches">--</div>
      <div class="sl">TRACKED MATCHES</div>
    </div>
    <div class="stat-card alert-card">
      <div class="sv" id="stat-alerts">--</div>
      <div class="sl">ALERTS FIRED</div>
    </div>
    <div class="stat-card">
      <div class="sv blue" id="stat-top-heat">--</div>
      <div class="sl">TOP HEAT SCORE</div>
    </div>
    <div class="stat-card">
      <div class="sv yellow" id="stat-last">--</div>
      <div class="sl">LAST SCAN</div>
    </div>
    <div class="stat-card">
      <div class="sv" id="stat-next" style="color:var(--purple)">--</div>
      <div class="sl">NEXT SCAN IN</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span style="font-size:10px;color:var(--muted);letter-spacing:2px;">▶ MATCHES</span>
    <button class="btn primary" onclick="refreshData()">⟳ REFRESH</button>
    <button class="btn" onclick="triggerScan()">⚡ SCAN NOW</button>
    <div class="toolbar-right">
      <span class="countdown" id="countdown-display"></span>
    </div>
  </div>

  <!-- MATCHES LIST -->
  <div class="matches-grid" id="matches-container">
    <div class="empty">
      <div class="e-icon">♠</div>
      <div class="e-text">LOADING DATA...</div>
    </div>
  </div>

</main>

<div class="bottom-bar">
  <span>CRAYXUS ENGINE v2.0</span>
  <span id="bottom-updated">LAST UPDATED: --</span>
  <span>UPSERT MODE: ALL RECORDS RETAINED UNTIL KICKOFF</span>
</div>

<div id="toast-container"></div>

<script>
  let allData = null;
  let nextScanTime = null;
  let countdownTimer = null;

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById('header-time').textContent =
      now.toLocaleTimeString('zh-CN', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Toast ──
  function toast(msg, type='info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderLeftColor = type === 'alert' ? 'var(--red)' : type === 'ok' ? 'var(--green)' : 'var(--purple)';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 6000);
  }

  // ── Refresh ──
  async function refreshData() {
    try {
      const r = await fetch('/api/data');
      const data = await r.json();
      allData = data;
      renderAll(data);
      updateScanStatus(data.scan_status);
    } catch(e) {
      toast('数据加载失败: ' + e.message, 'alert');
    }
  }

  async function triggerScan() {
    try {
      const r = await fetch('/api/scan', { method: 'POST' });
      const d = await r.json();
      toast(d.message, d.success ? 'ok' : 'alert');
      if (d.success) setTimeout(refreshData, 3000);
    } catch(e) {
      toast('扫描触发失败', 'alert');
    }
  }

  // ── Scan Status ──
  function updateScanStatus(status) {
    if (!status) return;
    const ind = document.getElementById('live-indicator');
    if (status.is_scanning) {
      ind.className = 'live-dot scanning';
      ind.textContent = 'SCANNING';
    } else if (status.error) {
      ind.className = 'live-dot offline';
      ind.textContent = 'ERROR';
    } else {
      ind.className = 'live-dot';
      ind.textContent = 'LIVE';
    }
    if (status.next_scan) {
      nextScanTime = new Date(status.next_scan.replace(' ', 'T'));
      startCountdown();
    }
    const lastEl = document.getElementById('stat-last');
    if (status.last_scan) {
      lastEl.textContent = status.last_scan.split(' ')[1] || status.last_scan;
    }
  }

  function startCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      if (!nextScanTime) return;
      const diff = Math.max(0, Math.floor((nextScanTime - Date.now()) / 1000));
      const m = Math.floor(diff / 60);
      const s = diff % 60;
      const txt = `${m}:${s.toString().padStart(2,'0')}`;
      document.getElementById('stat-next').textContent = txt;
      document.getElementById('countdown-display').textContent = `NEXT SCAN ${txt}`;
    }, 1000);
  }

  // ── Render All ──
  function renderAll(data) {
    // Stats
    document.getElementById('stat-matches').textContent = data.total_matches || 0;
    document.getElementById('stat-alerts').textContent = data.alert_count || 0;
    document.getElementById('bottom-updated').textContent = 'LAST UPDATED: ' + (data.last_updated || '--');

    const matches = data.matches || [];
    const topHeat = matches.length > 0 ? (matches[0].heat_score || 0).toFixed(1) : '--';
    document.getElementById('stat-top-heat').textContent = topHeat;

    // Sniper card
    renderSniperCard(matches);

    // Match cards
    renderMatches(matches);
  }

  // ── Sniper Card ──
  function renderSniperCard(matches) {
    const top = matches.find(m => m.rank === 1) || matches[0];
    if (!top) return;

    document.getElementById('sniper-match').textContent =
      `${top.home || '?'} vs ${top.away || '?'}`;
    document.getElementById('sniper-meta').textContent =
      `[${top.league || '--'}] ${top.match_time || ''} | HEAT: ${top.heat_score || 0}`;

    const sig = top.crayxus_signal || {};
    const mom = sig.momentum || 0;
    document.getElementById('sniper-momentum-val').textContent = mom;
    document.getElementById('sniper-momentum-fill').style.width = mom + '%';

    const dirEl = document.getElementById('sniper-direction');
    const labEl = document.getElementById('sniper-signal-label');
    const dir = sig.direction || 'neutral';
    dirEl.className = 'sniper-direction ' + dir;

    if (dir === 'home') {
      dirEl.textContent = '▲ HOME';
    } else if (dir === 'away') {
      dirEl.textContent = '▲ AWAY';
    } else {
      dirEl.textContent = '― WAIT';
    }
    labEl.textContent = sig.label || '等待信号';
  }

  // ── Match Cards ──
  function renderMatches(matches) {
    const container = document.getElementById('matches-container');
    if (!matches || matches.length === 0) {
      container.innerHTML = `<div class="empty"><div class="e-icon">♠</div><div class="e-text">NO MATCHES TRACKED YET</div></div>`;
      return;
    }

    container.innerHTML = matches.map((m, idx) => buildMatchCard(m, idx)).join('');
  }

  function buildMatchCard(m, idx) {
    const rank = m.rank || (idx + 1);
    const rankClass = rank <= 3 ? 'r' + rank : 'rn';
    const cardClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
    const alertClass = m.alert ? 'has-alert' : '';
    const sig = m.crayxus_signal || {};
    const dir = sig.direction || 'neutral';
    const mom = sig.momentum || 0;

    const signalPillText = dir === 'home' ? '▲ HOME' : dir === 'away' ? '▲ AWAY' : '― HOLD';
    const allRecords = m.all_records || [];
    const recordsToShow = allRecords.slice(0, 12);
    const hasMore = allRecords.length > 12;

    const alertBadge = m.alert ? `<span class="alert-badge">⚠ ALERT</span>` : '';

    const recordsHTML = recordsToShow.map(r => `
      <tr class="${r.in_window ? 'in-window' : ''}">
        <td style="color:var(--muted)">${r.time || '--'}</td>
        <td class="odds-home">${r.home_odds ?? '--'}</td>
        <td class="odds-hcap">${r.handicap || '--'}</td>
        <td class="odds-away">${r.away_odds ?? '--'}</td>
        <td class="${r.status === '即' ? 'status-ji' : 'status-zao'}">${r.status || '--'}</td>
      </tr>
    `).join('');

    const moreBtn = hasMore ? `<button class="more-records-btn" onclick="showMoreRecords(event,'${m.match_id}')">+ ${allRecords.length - 12} MORE RECORDS</button>` : '';

    // Bet365 section
    let bet365HTML = '';
    if (m.bet365_handicaps && m.bet365_handicaps.length > 0) {
      const pills = m.bet365_handicaps.map(h => `
        <div class="hcap-pill">
          <div class="hp-line">${h.line || '--'}</div>
          <div class="hp-odds">${h.home_odds || ''} / ${h.away_odds || ''}</div>
        </div>
      `).join('');
      bet365HTML = `
        <div class="bet365-section">
          <div class="bet365-title">▶ BET365 ALT ASIAN HANDICAP</div>
          <div class="hcap-grid">${pills}</div>
        </div>`;
    }

    return `
    <div class="match-card ${cardClass} ${alertClass}" id="card-${m.match_id}">
      <div class="match-header" onclick="toggleCard('${m.match_id}')">
        <div class="rank-badge ${rankClass}">#${rank}</div>
        <div class="match-teams">
          <div class="teams-name">${m.home || '?'} <span style="color:var(--muted)">vs</span> ${m.away || '?'} ${alertBadge}</div>
          <div class="teams-meta">[${m.league || '--'}] ${m.match_time || ''} | ${allRecords.length} records | ${m.minutes_to_kickoff != null ? m.minutes_to_kickoff + 'min to KO' : '--'}</div>
        </div>
        <div class="momentum-mini">
          <div class="momentum-mini-val">MOM ${mom}</div>
          <div class="momentum-mini-track">
            <div class="momentum-mini-fill" style="width:${mom}%"></div>
          </div>
        </div>
        <div class="signal-pill ${dir}">${signalPillText}</div>
        <div class="match-heat">
          <div class="heat-score">${(m.heat_score || 0).toFixed(0)}</div>
          <div class="heat-label">HEAT</div>
        </div>
        <div class="chevron" id="chev-${m.match_id}">▶</div>
      </div>
      <div class="match-body" id="body-${m.match_id}">
        <!-- Signal Detail -->
        <div class="signal-detail">
          <div class="sd-item">
            <div class="sd-k">DIRECTION</div>
            <div class="sd-v ${dir === 'home' ? 'down' : dir === 'away' ? 'blue' : ''}">${sig.label || '等待'}</div>
          </div>
          <div class="sd-item">
            <div class="sd-k">HOME CHANGE</div>
            <div class="sd-v ${(sig.home_change||0) < 0 ? 'down' : 'up'}">${sig.home_change != null ? (sig.home_change > 0 ? '+' : '') + sig.home_change : '--'}</div>
          </div>
          <div class="sd-item">
            <div class="sd-k">VELOCITY /hr</div>
            <div class="sd-v">${sig.velocity ?? '--'}</div>
          </div>
          <div class="sd-item">
            <div class="sd-k">UNIDIRECTIONAL</div>
            <div class="sd-v ${sig.is_unidirectional ? 'down' : ''}">${sig.is_unidirectional ? '✓ YES' : '✗ NO'}</div>
          </div>
          <div class="sd-item">
            <div class="sd-k">SAMPLES</div>
            <div class="sd-v">${sig.sample_count ?? allRecords.length}</div>
          </div>
          <div class="sd-item">
            <div class="sd-k">CROW RECORDS</div>
            <div class="sd-v yellow">${m.crow_record_count || 0} × ${m.time_weight || 1}x</div>
          </div>
        </div>

        <!-- Odds Table -->
        <div class="table-wrap">
          <table class="odds-table">
            <thead>
              <tr>
                <th>TIME</th>
                <th>HOME ODDS</th>
                <th>HANDICAP</th>
                <th>AWAY ODDS</th>
                <th>STATUS</th>
              </tr>
            </thead>
            <tbody id="tbody-${m.match_id}">${recordsHTML}</tbody>
          </table>
          ${moreBtn}
        </div>

        ${bet365HTML}
      </div>
    </div>`;
  }

  // ── Toggle card ──
  function toggleCard(matchId) {
    const body = document.getElementById('body-' + matchId);
    const header = body.previousElementSibling;
    const chev = document.getElementById('chev-' + matchId);
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    header.classList.toggle('expanded', !isOpen);
    chev.classList.toggle('open', !isOpen);
  }

  // ── Show more records ──
  function showMoreRecords(e, matchId) {
    e.stopPropagation();
    if (!allData) return;
    const match = allData.matches.find(m => m.match_id === matchId);
    if (!match) return;
    const tbody = document.getElementById('tbody-' + matchId);
    const allRecords = match.all_records || [];
    tbody.innerHTML = allRecords.map(r => `
      <tr class="${r.in_window ? 'in-window' : ''}">
        <td style="color:var(--muted)">${r.time || '--'}</td>
        <td class="odds-home">${r.home_odds ?? '--'}</td>
        <td class="odds-hcap">${r.handicap || '--'}</td>
        <td class="odds-away">${r.away_odds ?? '--'}</td>
        <td class="${r.status === '即' ? 'status-ji' : 'status-zao'}">${r.status || '--'}</td>
      </tr>
    `).join('');
    e.target.remove();
  }

  // ── SSE ──
  function connectSSE() {
    const evtSource = new EventSource('/api/stream');
    evtSource.onopen = () => {
      document.getElementById('live-indicator').className = 'live-dot';
      document.getElementById('live-indicator').textContent = 'LIVE';
    };
    evtSource.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'update') {
          allData = data;
          renderAll(data);
          toast('数据已更新', 'ok');
        } else if (data.type === 'alert') {
          toast(`⚠ ALERT: ${data.match} - ${data.reason}`, 'alert');
        }
      } catch(err) {}
    };
    evtSource.onerror = () => {
      document.getElementById('live-indicator').className = 'live-dot offline';
      document.getElementById('live-indicator').textContent = 'RECONNECTING';
      evtSource.close();
      setTimeout(connectSSE, 5000);
    };
  }

  // ── Init ──
  refreshData();
  connectSSE();
  setInterval(refreshData, 60000);
</script>
</body>
</html>
