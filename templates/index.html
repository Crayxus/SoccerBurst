<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRAYXUS SIGNAL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    :root {
      --bg:     #060810;
      --card:   #0c0f1a;
      --border: #1e2538;
      --text:   #cdd6f4;
      --muted:  #4a5273;
      --green:  #a6e3a1;
      --red:    #f38ba8;
      --yellow: #f9e2af;
      --blue:   #89b4fa;
      --purple: #cba6f7;
      --orange: #fab387;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .logo { font-size: 13px; font-weight: 700; color: var(--purple); letter-spacing: 3px; }
    .version { font-size: 11px; color: var(--muted); }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── MATCH INFO ── */
    .match-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .match-teams {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .match-teams .vs { color: var(--muted); font-size: 14px; font-weight: 400; margin: 0 10px; }

    /* ── SIGNAL BOX ── */
    .signal-box {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      margin: 16px 0;
      text-align: center;
      position: relative;
    }
    .signal-box.home  { border-color: var(--green);  background: rgba(166,227,161,0.04); }
    .signal-box.away  { border-color: var(--orange); background: rgba(250,179,135,0.04); }
    .signal-box.cold  { border-color: var(--red);    background: rgba(243,139,168,0.05); }
    .signal-box.empty { border-color: var(--muted);  }

    .signal-type {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .signal-type.cold   { color: var(--red); }
    .signal-type.normal { color: var(--green); }
    .signal-type.water  { color: var(--blue); }

    .signal-team {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .home  .signal-team { color: var(--green); }
    .away  .signal-team { color: var(--orange); }
    .cold  .signal-team { color: var(--red); }

    .signal-line {
      font-size: 16px;
      color: var(--yellow);
      margin-bottom: 4px;
    }
    .signal-odds {
      font-size: 24px;
      font-weight: 700;
      color: var(--yellow);
    }

    .confidence-bar-wrap {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .confidence-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .confidence-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--purple);
      transition: width 0.6s ease;
    }
    .confidence-label {
      font-size: 12px;
      color: var(--purple);
      min-width: 40px;
      text-align: right;
    }

    /* ── FACTORS ── */
    .factor-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .factor-row:last-child { border-bottom: none; }
    .factor-name {
      font-size: 11px;
      color: var(--muted);
      min-width: 90px;
    }
    .factor-val {
      font-size: 11px;
      color: var(--text);
      flex: 1;
    }
    .factor-dir {
      font-size: 11px;
      font-weight: 600;
      min-width: 60px;
      text-align: right;
    }
    .dir-home  { color: var(--green); }
    .dir-away  { color: var(--orange); }
    .dir-neutral { color: var(--muted); }

    /* ── HISTORY ── */
    .hist-row {
      display: grid;
      grid-template-columns: 80px 1fr 80px 80px 60px;
      gap: 8px;
      padding: 8px 0;
      font-size: 11px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-row.header { color: var(--muted); font-size: 10px; letter-spacing: 1px; }
    .hist-date  { color: var(--muted); }
    .hist-match { color: var(--text); }
    .hist-signal { color: var(--blue); }
    .hist-result { color: var(--muted); }
    .hist-pnl.win  { color: var(--green); }
    .hist-pnl.lose { color: var(--red); }
    .hist-pnl.pending { color: var(--muted); }

    /* ── STATS ROW ── */
    .stats-row {
      display: flex;
      gap: 24px;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
    }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    .stat-value { font-size: 16px; font-weight: 700; }
    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.blue   { color: var(--blue); }

    /* ── RESULT INPUT ── */
    .result-form {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .result-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 4px;
      width: 60px;
      text-align: center;
    }
    .result-form input:focus { outline: none; border-color: var(--purple); }
    .btn {
      background: transparent;
      border: 1px solid var(--purple);
      color: var(--purple);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: rgba(203,166,247,0.1); }
    .btn.refresh { border-color: var(--blue); color: var(--blue); }
    .btn.refresh:hover { background: rgba(137,180,250,0.1); }

    .result-label { font-size: 11px; color: var(--muted); }

    /* ── EMPTY / ERROR ── */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── WEIGHTS ── */
    .weight-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 4px 0;
      color: var(--muted);
    }
    .weight-row span:last-child { color: var(--blue); }

    /* ── STATUS BAR ── */
    .status-bar {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      padding: 8px 0;
    }
    #status-msg { color: var(--green); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">CRAYXUS SIGNAL</div>
  <div class="version" id="analyzed-at">--</div>
</div>

<!-- TODAY'S PICK -->
<div class="card" id="card-match">
  <div class="card-label">TODAY'S PICK</div>
  <div id="match-content">
    <div class="empty">加载中...</div>
  </div>
</div>

<!-- FACTORS -->
<div class="card" id="card-factors" style="display:none">
  <div class="card-label">FACTOR BREAKDOWN</div>
  <div id="factors-content"></div>
</div>

<!-- RESULT INPUT -->
<div class="card" id="card-result" style="display:none">
  <div class="card-label">RECORD RESULT</div>
  <div class="result-form">
    <span class="result-label">比分</span>
    <input type="number" id="home-score" placeholder="主" min="0" max="20" />
    <span class="result-label">:</span>
    <input type="number" id="away-score" placeholder="客" min="0" max="20" />
    <button class="btn" onclick="submitResult()">CONFIRM</button>
    <span id="result-msg" style="font-size:11px; color:var(--green); margin-left:8px;"></span>
  </div>
</div>

<!-- HISTORY -->
<div class="card" id="card-history" style="display:none">
  <div class="card-label">SIGNAL HISTORY</div>
  <div id="stats-content"></div>
  <div id="history-content"></div>
</div>

<!-- FACTOR WEIGHTS -->
<div class="card" id="card-weights" style="display:none">
  <div class="card-label">FACTOR WEIGHTS (AUTO-TUNED)</div>
  <div id="weights-content"></div>
</div>

<!-- PATTERN ANALYSIS -->
<div class="card" id="card-patterns" style="display:none">
  <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
    <span>PATTERN ANALYSIS</span>
    <button class="btn" onclick="loadPatterns()" style="font-size:10px;padding:4px 10px">REANALYZE</button>
  </div>
  <div id="patterns-content"><div style="font-size:11px;color:var(--muted)">点击 REANALYZE 提炼历史规律</div></div>
</div>

<div class="status-bar">
  <span id="status-msg">初始化...</span>
  <button class="btn refresh" onclick="loadSignal()">REFRESH</button>
</div>

<script>
  let currentMatchKey = null;
  let currentDirection = null;
  let signalData = null;

  async function loadSignal() {
    setStatus('分析中...');
    try {
      const r = await fetch('/api/today_signal');
      const d = await r.json();
      signalData = d;

      if (d.error) {
        document.getElementById('match-content').innerHTML =
          `<div class="empty">${d.error}</div>`;
        setStatus(d.error);
        return;
      }

      currentMatchKey  = d.match_key;
      currentDirection = d.direction;

      renderMatch(d);
      renderFactors(d.factors, d.direction);
      renderHistory(d.history, d.stats);
      renderWeights(d.weights_used);

      document.getElementById('card-factors').style.display  = 'block';
      document.getElementById('card-result').style.display   = 'block';
      document.getElementById('card-history').style.display  = 'block';
      document.getElementById('card-weights').style.display  = 'block';

      document.getElementById('analyzed-at').textContent = d.analyzed_at || '';
      setStatus('已更新');
    } catch(e) {
      setStatus('加载失败: ' + e.message);
    }
  }

  function renderMatch(d) {
    const line     = d.best_line || {};
    const hc       = line.handicap || '--';
    const odds     = line.odds     || '--';
    const isHome   = d.direction === 'home';
    const isCold   = d.signal_type === '背离爆冷';
    const boxClass = isCold ? 'cold' : (isHome ? 'home' : 'away');
    const typeClass = isCold ? 'cold' : (d.signal_type === '水位跟随' ? 'water' : 'normal');

    const conf = d.confidence || 0;

    document.getElementById('match-content').innerHTML = `
      <div class="match-meta">${d.league || ''} &nbsp;|&nbsp; ${(d.match_time||'').replace('\n',' ')}</div>
      <div class="match-teams">
        <span>${d.home}</span>
        <span class="vs">vs</span>
        <span>${d.away}</span>
      </div>
      <div class="signal-box ${boxClass}">
        <div class="signal-type ${typeClass}">${d.signal_type}</div>
        <div class="signal-team">${d.direction_team}</div>
        <div class="signal-line">${hc}</div>
        <div class="signal-odds">@ ${odds}</div>
        <div class="confidence-bar-wrap">
          <div class="confidence-bar-bg">
            <div class="confidence-bar-fill" style="width:${conf}%"></div>
          </div>
          <div class="confidence-label">${conf}%</div>
        </div>
      </div>
    `;
  }

  function renderFactors(f, direction) {
    if (!f) return;

    const lc = f.line_compression || {};
    const w  = f.water            || {};
    const dr = f.drift            || {};

    const dirClass = d => d === 'home' ? 'dir-home' : d === 'away' ? 'dir-away' : 'dir-neutral';
    const teamName = (dir, home, away) => dir === 'home' ? home : dir === 'away' ? away : '中立';

    const sData = signalData || {};
    const home  = sData.home || '主';
    const away  = sData.away || '客';

    const rows = [
      {
        name: '盘口压缩',
        val:  `${lc.early_hc || '--'} → ${lc.latest_hc || '--'}  (${lc.delta >= 0 ? '+' : ''}${lc.delta || 0}步)`,
        dir:  lc.direction,
        label: teamName(lc.direction, home, away),
      },
      {
        name: '水位偏压',
        val:  `${home} ${w.home_odds || '--'} / ${away} ${w.away_odds || '--'}  偏差 ${w.imbalance || 0}`,
        dir:  w.direction,
        label: (w.aligned ? '同向' : '背离') + ' ' + teamName(w.direction, home, away),
      },
      {
        name: '水位连贯',
        val:  `${(dr.consistency || 0) * 100}%  共${dr.records || 0}条记录  总漂移${dr.total_drift || 0}`,
        dir:  direction,
        label: `${Math.round((dr.consistency || 0) * 100)}%`,
      },
    ];

    document.getElementById('factors-content').innerHTML = rows.map(r => `
      <div class="factor-row">
        <div class="factor-name">${r.name}</div>
        <div class="factor-val">${r.val}</div>
        <div class="factor-dir ${dirClass(r.dir)}">${r.label}</div>
      </div>
    `).join('');
  }

  function renderHistory(history, stats) {
    // Stats
    const s = stats || {};
    document.getElementById('stats-content').innerHTML = `
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-label">RECORD</div>
          <div class="stat-value blue">${s.wins || 0} / ${s.total || 0}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">WIN RATE</div>
          <div class="stat-value ${(s.win_rate||0) >= 55 ? 'green' : 'yellow'}">${s.win_rate || 0}%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">TOTAL P&L</div>
          <div class="stat-value ${(s.total_pnl||0) >= 0 ? 'green' : ''}" style="${(s.total_pnl||0) < 0 ? 'color:var(--red)' : ''}">
            ${(s.total_pnl||0) >= 0 ? '+' : ''}${s.total_pnl || 0}u
          </div>
        </div>
      </div>
    `;

    // Table
    if (!history || !history.length) {
      document.getElementById('history-content').innerHTML =
        '<div style="font-size:11px;color:var(--muted);padding-top:12px">暂无历史记录</div>';
      return;
    }

    const header = `
      <div class="hist-row header">
        <div>DATE</div>
        <div>MATCH</div>
        <div>SIGNAL</div>
        <div>RESULT</div>
        <div>P&L</div>
      </div>`;

    const rows = history.map(r => {
      const pnl = r.correct === true  ? `<div class="hist-pnl win">+${r.pnl}u</div>`
                : r.correct === false ? `<div class="hist-pnl lose">${r.pnl}u</div>`
                : `<div class="hist-pnl pending">--</div>`;

      const line = r.best_line ? `${r.best_line.handicap} @${r.best_line.odds}` : '--';

      return `
        <div class="hist-row">
          <div class="hist-date">${(r.date||'').slice(5)}</div>
          <div class="hist-match">${r.home} v ${r.away}</div>
          <div class="hist-signal">${r.direction_team || '--'}<br><span style="color:var(--muted);font-size:10px">${line}</span></div>
          <div class="hist-result">${r.result || '--'}</div>
          ${pnl}
        </div>`;
    }).join('');

    document.getElementById('history-content').innerHTML = header + rows;
  }

  function renderWeights(w) {
    if (!w) return;
    const labels = {
      line_compression:      '盘口压缩方向',
      compression_magnitude: '压缩幅度',
      water_alignment:       '水位对齐',
      drift_consistency:     '水位连贯性',
    };
    document.getElementById('weights-content').innerHTML =
      Object.entries(w).map(([k, v]) => `
        <div class="weight-row">
          <span>${labels[k] || k}</span>
          <span>${Math.round(v * 100)}%</span>
        </div>
      `).join('');
  }

  async function submitResult() {
    const h = parseInt(document.getElementById('home-score').value);
    const a = parseInt(document.getElementById('away-score').value);
    if (isNaN(h) || isNaN(a)) {
      document.getElementById('result-msg').textContent = '请输入比分';
      return;
    }
    if (!currentMatchKey) {
      document.getElementById('result-msg').textContent = '无当前比赛';
      return;
    }

    try {
      const r = await fetch('/api/signal_result', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          match_key:  currentMatchKey,
          home_score: h,
          away_score: a,
        }),
      });
      const d = await r.json();

      if (d.success) {
        const rec    = d.record || {};
        const result = rec.correct === true ? '赢 ' + (rec.pnl >= 0 ? '+' : '') + rec.pnl + 'u'
                     : rec.correct === false ? '输 -1u'
                     : '退水';
        document.getElementById('result-msg').textContent = result;
        document.getElementById('result-msg').style.color =
          rec.correct ? 'var(--green)' : 'var(--red)';
        setTimeout(loadSignal, 800);
      }
    } catch(e) {
      document.getElementById('result-msg').textContent = '提交失败';
    }
  }

  function setStatus(msg) {
    document.getElementById('status-msg').textContent = msg;
  }

  async function loadPatterns() {
    document.getElementById('patterns-content').innerHTML =
      '<div style="font-size:11px;color:var(--muted)">分析中...</div>';
    try {
      const r = await fetch('/api/reanalyze');
      const d = await r.json();

      if (d.error) {
        document.getElementById('patterns-content').innerHTML =
          `<div style="font-size:11px;color:var(--muted)">${d.error}（已结算：${d.settled || 0}场）</div>`;
        return;
      }

      const wa = d.win_avg  || {};
      const la = d.loss_avg || {};

      const compRow = (label, wv, lv, unit='') => `
        <div class="factor-row">
          <div class="factor-name">${label}</div>
          <div class="factor-val">赢 <span style="color:var(--green)">${wv}${unit}</span>
            &nbsp;/&nbsp; 输 <span style="color:var(--red)">${lv}${unit}</span></div>
        </div>`;

      const csRows = Object.entries(d.confidence_stats || {}).map(([b, s]) => `
        <div class="factor-row">
          <div class="factor-name">信心 ${b}%</div>
          <div class="factor-val">${s.count}场 · 胜率 <span style="${s.win_rate>=55?'color:var(--green)':'color:var(--red)'}">${s.win_rate}%</span></div>
        </div>`).join('');

      const patterns = (d.patterns || []).map(p =>
        `<div style="font-size:11px;color:var(--yellow);padding:4px 0;border-bottom:1px solid var(--border)">▶ ${p}</div>`
      ).join('');

      document.getElementById('patterns-content').innerHTML = `
        ${compRow('盘口压缩幅度', wa.avg_compression_size, la.avg_compression_size, '步')}
        ${compRow('水位连贯性',   Math.round((wa.avg_consistency||0)*100)+'%', Math.round((la.avg_consistency||0)*100)+'%')}
        ${compRow('水位偏差',     wa.avg_water_imbalance, la.avg_water_imbalance)}
        ${csRows}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          ${patterns}
        </div>
        <div style="font-size:11px;color:var(--purple);margin-top:10px">建议：${d.recommendation || '--'}</div>
      `;

      document.getElementById('card-patterns').style.display = 'block';
    } catch(e) {
      document.getElementById('patterns-content').innerHTML =
        `<div style="font-size:11px;color:var(--red)">加载失败: ${e.message}</div>`;
    }
  }

  // 自动刷新
  loadSignal();
  setInterval(loadSignal, 60000);
</script>
</body>
</html>
